name: FinanceTracker
options:
  bundleIdPrefix: com.financetracker
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
targets:
  FinanceTracker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FinanceTracker
    resources:
      - path: FinanceTracker/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.financetracker.app
        INFOPLIST_FILE: FinanceTracker/Resources/Info.plist
        SWIFT_VERSION: 5.9
      configs:
        Debug:
          API_BASE_URL: https://www.wisefintrakr.com
        Release:
          API_BASE_URL: https://www.wisefintrakr.com
